version: "3.9"

services:
  dcc-mcp-fpt:
    image: dcc-mcp-fpt:latest
    build: .
    ports:
      - "${DCC_MCP_GATEWAY_PORT:-9765}:9765"
    env_file:
      - .env
    volumes:
      - skills:/skills:ro
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9765/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 5s
    restart: unless-stopped
    stop_grace_period: 15s
    stop_signal: SIGTERM

volumes:
  skills:
