tools:
  - name: batch_operations
    description: "Execute multiple create, update, or delete operations in a single ShotGrid API call."
    source_file: scripts/batch_operations.py
    input_schema:
      type: object
      required: ["requests"]
      properties:
        requests:
          type: array
          description: "List of batch requests, each with: request_type (create/update/delete), entity_type, entity_id (for update/delete), data (for create/update)."
          items:
            type: object
        project:
          type: string
          description: "Optional project name, code, or tank name used for default project injection and permission checks."
        project_id:
          type: integer
          description: "Optional project ID used for default project injection and permission checks."
        project_scoped:
          type: boolean
          description: "Whether to inject or validate project context for each request."
          default: true
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    execution: sync
    affinity: any
    enforce_thread_affinity: false
    timeout_hint_secs: 120
    annotations:
      read_only_hint: false
      destructive_hint: true
      idempotent_hint: false
      open_world_hint: false
      deferred_hint: false
    next-tools:
      on-success: []
      on-failure: []
