tools:
  - name: get_schema
    description: "Get full schema for all ShotGrid entity types."
    source_file: scripts/get_schema.py
    input_schema:
      type: object
      properties: {}
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    execution: sync
    affinity: any
    enforce_thread_affinity: false
    timeout_hint_secs: 60
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
      deferred_hint: false
    next-tools:
      on-success: ["get_field_schema", "list_entity_types"]
      on-failure: []

  - name: get_field_schema
    description: "Get field definitions for a specific entity type."
    source_file: scripts/get_field_schema.py
    input_schema:
      type: object
      required: ["entity_type"]
      properties:
        entity_type:
          type: string
          description: "Entity type to inspect (e.g., 'Shot', 'Asset', 'Task')."
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    execution: sync
    affinity: any
    enforce_thread_affinity: false
    timeout_hint_secs: 30
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
      deferred_hint: false
    next-tools:
      on-success: ["shotgrid-crud__create_entity", "shotgrid-search__search_entities"]
      on-failure: []

  - name: list_entity_types
    description: "List all available entity types from schema cache."
    source_file: scripts/list_entity_types.py
    input_schema:
      type: object
      properties: {}
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    execution: sync
    affinity: any
    enforce_thread_affinity: false
    timeout_hint_secs: 15
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
      deferred_hint: false
    next-tools:
      on-success: ["get_field_schema"]
      on-failure: []
