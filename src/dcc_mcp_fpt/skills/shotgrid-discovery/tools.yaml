tools:
  - name: check_connection
    description: "Verify ShotGrid credentials and return connection diagnostics."
    source_file: scripts/check_connection.py
    input_schema:
      type: object
      properties: {}
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    execution: sync
    affinity: any
    enforce_thread_affinity: false
    timeout_hint_secs: 15
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
      deferred_hint: false
    next-tools:
      on-success: ["list_entity_types", "get_server_info"]
      on-failure: []

  - name: list_entity_types
    description: "List all available ShotGrid entity types (e.g., Shot, Asset, Task)."
    source_file: scripts/list_entity_types.py
    input_schema:
      type: object
      properties: {}
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    execution: sync
    affinity: any
    enforce_thread_affinity: false
    timeout_hint_secs: 30
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
      deferred_hint: false
    next-tools:
      on-success: ["shotgrid-schema__get_schema"]
      on-failure: []

  - name: get_server_info
    description: "Return ShotGrid server version and metadata."
    source_file: scripts/get_server_info.py
    input_schema:
      type: object
      properties: {}
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    execution: sync
    affinity: any
    enforce_thread_affinity: false
    timeout_hint_secs: 15
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
      deferred_hint: false
    next-tools:
      on-success: []
      on-failure: []
