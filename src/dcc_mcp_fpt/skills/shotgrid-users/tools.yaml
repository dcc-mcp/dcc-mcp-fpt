tools:
  - name: whoami
    description: >-
      Report effective ShotGrid credentials, permission level, and active
      credential profile — secrets are never included in the output.
    source_file: scripts/whoami.py
    input_schema:
      type: object
      properties:
        _meta:
          type: object
          description: >-
            Optional MCP metadata with credential_profile and agent_context
            for request-scoped credential resolution.
      additionalProperties: true
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    execution: sync
    affinity: any
    enforce_thread_affinity: false
    timeout_hint_secs: 15
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
      deferred_hint: false
    next-tools:
      on-success: []
      on-failure: []
