tools:
  - name: search_entities
    description: "Advanced entity search with text matching and filter composition."
    source_file: scripts/search_entities.py
    input_schema:
      type: object
      required: ["entity_type"]
      properties:
        entity_type:
          type: string
          description: "Entity type to search."
        text:
          type: string
          description: "Free-text search across text fields."
        filters:
          type: array
          description: "Additional ShotGrid filter conditions."
        fields:
          type: array
          items:
            type: string
          description: "Fields to retrieve."
        limit:
          type: integer
          default: 500
          description: "Maximum results."
        project:
          type: string
          description: "Optional project name, code, or tank name. Defaults to SHOTGRID_PROJECT."
        project_id:
          type: integer
          description: "Optional project ID. Overrides project name/code when provided."
        project_scoped:
          type: boolean
          description: "Whether to add the project filter when a project context is available."
          default: true
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    execution: sync
    affinity: any
    enforce_thread_affinity: false
    timeout_hint_secs: 60
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
      deferred_hint: false
    next-tools:
      on-success: ["search_by_name", "shotgrid-crud__find_entities"]
      on-failure: []

  - name: search_by_name
    description: "Convenience search — find entities by code or name field."
    source_file: scripts/search_by_name.py
    input_schema:
      type: object
      required: ["entity_type", "name"]
      properties:
        entity_type:
          type: string
          description: "Entity type to search."
        name:
          type: string
          description: "Name or code to match (partial match via 'contains')."
        fields:
          type: array
          items:
            type: string
          description: "Fields to retrieve."
        limit:
          type: integer
          default: 100
          description: "Maximum results."
        project:
          type: string
          description: "Optional project name, code, or tank name. Defaults to SHOTGRID_PROJECT."
        project_id:
          type: integer
          description: "Optional project ID. Overrides project name/code when provided."
        project_scoped:
          type: boolean
          description: "Whether to add the project filter when a project context is available."
          default: true
      additionalProperties: false
    output_schema:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
        context:
          type: object
    execution: sync
    affinity: any
    enforce_thread_affinity: false
    timeout_hint_secs: 30
    annotations:
      read_only_hint: true
      destructive_hint: false
      idempotent_hint: true
      open_world_hint: false
      deferred_hint: false
    next-tools:
      on-success: ["shotgrid-crud__find_one_entity"]
      on-failure: []
