name: Live ShotGrid Smoke

on:
  workflow_dispatch:
    inputs:
      project:
        description: "ShotGrid project name, code, or tank name."
        required: false
        default: ""
      project_id:
        description: "ShotGrid project ID. Overrides project when provided."
        required: false
        default: ""
      entity_type:
        description: "Temporary entity type to create/update/retire."
        required: false
        default: "Playlist"
      confirm_crud:
        description: "Run create/update/delete instead of dry-run skip."
        type: boolean
        required: true
        default: false

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: false

jobs:
  live-smoke:
    name: Live ShotGrid CRUD Smoke
    runs-on: ubuntu-latest
    env:
      SHOTGRID_URL: ${{ secrets.SHOTGRID_URL }}
      SHOTGRID_SCRIPT_NAME: ${{ secrets.SHOTGRID_SCRIPT_NAME }}
      SHOTGRID_SCRIPT_KEY: ${{ secrets.SHOTGRID_SCRIPT_KEY }}
      SHOTGRID_PROJECT: ${{ inputs.project }}
      SHOTGRID_PROJECT_ID: ${{ inputs.project_id }}
      SHOTGRID_SMOKE_ENTITY_TYPE: ${{ inputs.entity_type }}
      SHOTGRID_LIVE_CRUD_CONFIRM: ${{ inputs.confirm_crud && '1' || '0' }}
      DCC_MCP_ALLOW_AMBIENT_PYTHON: "1"
      DCC_MCP_DISABLE_FILE_LOGGING: "1"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run live ShotGrid smoke
        run: python tools/shotgrid_live_crud_smoke.py
