name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Run tests
        env:
          DCC_MCP_ALLOW_AMBIENT_PYTHON: "1"
        run: |
          pytest tests/ \
            --cov=src/dcc_mcp_fpt \
            --cov-report=xml \
            --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install ruff
        run: pip install ruff

      - name: Ruff check
        run: ruff check src/ tests/

      - name: Ruff format check
        run: ruff format --check src/ tests/

  cli-smoke:
    name: CLI Smoke Test
    runs-on: ubuntu-latest
    env:
      DCC_MCP_ALLOW_AMBIENT_PYTHON: "1"
      DCC_MCP_DISABLE_FILE_LOGGING: "1"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[dev]"

      - name: Verify CLI import
        run: |
          python -c "
          from dcc_mcp_fpt import ShotGridMcpServer, __version__
          print(f'dcc-mcp-fpt version: {__version__}')
          print('ShotGridMcpServer imported successfully')
          "

      - name: Verify CLI entry point
        run: |
          dcc-mcp-fpt --help

      - name: Verify module entry point
        run: |
          python -m dcc_mcp_fpt --help
