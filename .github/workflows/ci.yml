name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test ${{ matrix.os }} py${{ matrix.python-version }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        python-version: ["3.8", "3.9", "3.10", "3.11", "3.12"]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Run tests
        env:
          DCC_MCP_ALLOW_AMBIENT_PYTHON: "1"
          DCC_MCP_DISABLE_FILE_LOGGING: "1"
        run: python -m pytest tests/ --cov=src/dcc_mcp_fpt --cov-report=xml --cov-report=term

      - name: Upload coverage to Codecov
        if: matrix.os == 'ubuntu-latest' && matrix.python-version == '3.12'
        uses: codecov/codecov-action@v6
        with:
          files: ./coverage.xml
          fail_ci_if_error: false
          token: ${{ secrets.CODECOV_TOKEN }}

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install ruff
        run: python -m pip install ruff

      - name: Ruff check
        run: python -m ruff check src/ tests/ tools/

      - name: Ruff format check
        run: python -m ruff format --check src/ tests/ tools/

  lint-skills:
    name: Lint Skills
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install skill lint dependencies
        run: python -m pip install pyyaml

      - name: Validate bundled skill metadata
        run: python tools/lint_skills.py

  cli-smoke:
    name: CLI Smoke
    runs-on: ubuntu-latest
    env:
      DCC_MCP_ALLOW_AMBIENT_PYTHON: "1"
      DCC_MCP_DISABLE_FILE_LOGGING: "1"

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"

      - name: Verify package import
        run: |
          python - <<'PY'
          from dcc_mcp_fpt import ShotGridMcpServer, __version__

          print(f"dcc-mcp-fpt version: {__version__}")
          print(ShotGridMcpServer.__name__)
          PY

      - name: Verify CLI entry points
        run: |
          dcc-mcp-fpt --help
          python -m dcc_mcp_fpt --help

      - name: Verify live smoke skips without secrets
        run: python tools/shotgrid_live_crud_smoke.py

  package:
    name: Package
    runs-on: ubuntu-latest
    needs: [test, lint, lint-skills, cli-smoke]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install build tools
        run: python -m pip install build twine

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  docker-build:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test, lint, lint-skills]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build Docker image
        run: docker build -t dcc-mcp-fpt:ci .
