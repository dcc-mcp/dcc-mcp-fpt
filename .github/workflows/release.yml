name: Release

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      force_publish:
        description: "Force publish even if release-please skips (for recovery)"
        type: boolean
        required: false
        default: false
      tag_name:
        description: "Tag name for force_publish mode (e.g. v0.1.5)"
        type: string
        required: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ github.event_name }}
  cancel-in-progress: ${{ github.event_name == 'push' }}

permissions:
  contents: write
  pull-requests: write
  id-token: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    outputs:
      release_created: ${{ steps.release.outputs.release_created }}
      tag_name: ${{ steps.release.outputs.tag_name }}
      version: ${{ steps.release.outputs.version }}
    steps:
      - uses: googleapis/release-please-action@v5
        id: release
        with:
          token: ${{ secrets.PERSONAL_ACCESS_TOKEN || secrets.GITHUB_TOKEN }}
          config-file: release-please-config.json
          manifest-file: .release-please-manifest.json

  build:
    needs: [release-please]
    if: >
      needs.release-please.outputs.release_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_publish == 'true')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python 3.12
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install package and build tools
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
          python -m pip install build twine

      - name: Run release tests
        env:
          DCC_MCP_ALLOW_AMBIENT_PYTHON: "1"
          DCC_MCP_DISABLE_FILE_LOGGING: "1"
        run: python -m pytest tests/ -v --tb=short

      - name: Build wheel and sdist
        run: python -m build

      - name: Check distribution metadata
        run: python -m twine check dist/*

      - name: Upload dist artifacts
        uses: actions/upload-artifact@v7
        with:
          name: dist
          path: dist/

  publish:
    needs: [release-please, build]
    if: >
      needs.release-please.outputs.release_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_publish == 'true')
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/dcc-mcp-fpt
    permissions:
      id-token: write

    steps:
      - uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          verbose: true
          print-hash: true

  attach-release-assets:
    needs: [release-please, publish]
    if: >
      needs.release-please.outputs.release_created == 'true' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.force_publish == 'true')
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6

      - name: Download dist artifacts
        uses: actions/download-artifact@v8
        with:
          name: dist
          path: dist/

      - name: Attach dist artifacts to GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ needs.release-please.outputs.tag_name || github.event.inputs.tag_name }}
          files: dist/*
